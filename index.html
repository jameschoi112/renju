<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>인공지능을 이겨라!</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main class="app">
    <h1>인공지능을 이겨라!</h1>
    <div id="info">
      <span class="pill pill-human">● 당신</span>
      <span class="pill pill-ai">○ AI</span>
      <span class="pill pill-rule">렌주 오목 규칙</span>
    </div>
    <div id="status">흑의 차례</div>
    <div id="toast"></div>
    <canvas id="c"></canvas>
    <div id="controls">
      <button id="resetBtn">새 게임</button>
      <button id="btnFirst">AI 선공</button>
      <button id="btnFirstCustom">AI 선공 (custom)</button>
    </div>
  </main>

  <script type="module" src="js/main.js"></script>
</body>
</html>
